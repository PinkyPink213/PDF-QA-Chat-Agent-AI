services:
  rag:
    build: .
    env_file:
      - .env
    command: python index.py

  worker:
    build: .
    env_file:
      - .env
    command: rq worker --url redis://valkey:6379
    depends_on:
      - vector-db
      - valkey
    environment:
      - OBJC_DISABLE_INITIALIZE_FORK_SAFETY=YES

  api:
    build: .
    env_file:
      - .env
    command: uvicorn server:app --host 0.0.0.0 --port 8000
    depends_on:
      - vector-db
      - valkey
    ports:
      - "8000:8000"
  frontend:
    build: .
    env_file:
      - .env
    command: python gradio_app.py
    depends_on:
      - api
    ports:
      - "7860:7860"

  vector-db:
    image: qdrant/qdrant
    ports:
      - "6333:6333"

  valkey:
    image: valkey/valkey:latest
    ports:
      - "6379:6379"
